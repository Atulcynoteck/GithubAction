name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Xcode version (15.2)
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build and test with detected scheme
        run: |
          # Detect the default scheme from your workspace
          scheme_list=$(xcodebuild -list -workspace *.xcworkspace -json | tr -d "\n")
          scheme=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['workspace']['schemes'][0]")
          echo "Detected scheme: $scheme"

          # Get first available simulator (iPhone)
          device=$(xcrun xctrace list devices 2>&1 | grep -oE 'iPhone.*?[^\(]+' | head -1 | awk '{$1=$1;print}' | sed -e "s/ Simulator$//")
          echo "Using simulator: $device"

          # Build for testing
          xcodebuild build-for-testing \
            -workspace *.xcworkspace \
            -scheme "$scheme" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=$device"

          # Run tests
          xcodebuild test-without-building \
            -workspace *.xcworkspace \
            -scheme "$scheme" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=$device"
