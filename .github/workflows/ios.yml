name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_16.app

    - name: Install CocoaPods
      run: |
        gem install cocoapods
        pod install
      if: exists(file: 'Podfile')

    - name: Clean DerivedData
      run: rm -rf ~/Library/Developer/Xcode/DerivedData

    - name: Build
      run: xcodebuild -workspace GithubActionDemo.xcworkspace -scheme GithubActionDemoTestsScheme -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15,OS=18.0' clean build

    - name: Run unit tests
      run: xcodebuild -workspace GithubActionDemo.xcworkspace -scheme GithubActionDemoTestsScheme -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15,OS=18.0' -only-testing:GithubActionDemoTests test -verbose
